<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peng AI — Weiqi Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #0d0d0d;
    color: white;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 700px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 2rem;
  }

  .header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.03em;
  }

  .header h1 span {
    color: #e8ff00;
  }

  .header p {
    color: #666;
    font-size: 0.9rem;
    margin-top: 0.3rem;
  }

  .chat-box {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    padding: 1rem 0;
  }

  .message {
    display: flex;
    gap: 0.8rem;
    align-items: flex-start;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { flex-direction: row-reverse; }

  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
  }

  .avatar.ai { background: #1a1a2e; border: 1px solid #e8ff00; }
  .avatar.user { background: #222; }

  .bubble {
    max-width: 80%;
    padding: 0.9rem 1.2rem;
    border-radius: 16px;
    font-size: 0.95rem;
    line-height: 1.6;
    white-space: pre-wrap;
  }

  .message.ai .bubble {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-top-left-radius: 4px;
  }

  .message.user .bubble {
    background: #e8ff00;
    color: #0d0d0d;
    border-top-right-radius: 4px;
  }

  .input-row {
    display: flex;
    gap: 0.8rem;
    margin-top: 1rem;
  }

  input {
    flex: 1;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 0.9rem 1.2rem;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus { border-color: #e8ff00; }
  input::placeholder { color: #444; }

  button {
    background: #e8ff00;
    color: #0d0d0d;
    border: none;
    border-radius: 12px;
    padding: 0.9rem 1.5rem;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
  }

  button:hover { transform: translateY(-1px); opacity: 0.9; }
  button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .typing {
    display: flex;
    gap: 4px;
    padding: 0.5rem 0;
  }

  .typing span {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #444;
    animation: bounce 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-8px); background: #e8ff00; }
  }

  /* TRAIN PANEL */
  .train-btn {
    background: transparent;
    border: 1px solid #2a2a2a;
    color: #666;
    font-size: 0.8rem;
    padding: 0.5rem 1rem;
    margin-top: 0.5rem;
    width: 100%;
  }

  .train-panel {
    display: none;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 16px;
    padding: 1.5rem;
    margin-top: 1rem;
    gap: 1rem;
    flex-direction: column;
  }

  .train-panel.open { display: flex; }

  .train-panel h3 {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    color: #e8ff00;
  }

  .train-panel input {
    background: #111;
  }

  select {
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 0.9rem 1.2rem;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    outline: none;
    width: 100%;
  }

  .unbekannte-liste {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    max-height: 150px;
    overflow-y: auto;
  }

  .unbekannte-item {
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 0.6rem 1rem;
    font-size: 0.85rem;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .unbekannte-item:hover { border-color: #e8ff00; color: #e8ff00; }
  .unbekannte-item.selected { border-color: #e8ff00; color: #e8ff00; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Peng <span>AI</span> 围棋</h1>
    <p>Dein Weiqi-Assistent — powered by ppm</p>
  </div>

  <div class="chat-box" id="chatBox">
    <div class="message ai">
      <div class="avatar ai">🤖</div>
      <div class="bubble">👋 Hallo! Ich bin Peng AI. Frag mich alles über Weiqi — Regeln, Strategien, Züge!</div>
    </div>
  </div>

  <div class="input-row">
    <input type="text" id="frageInput" placeholder="Stelle eine Frage über Weiqi..." />
    <button id="sendenBtn" onclick="senden()">Senden</button>
  </div>

  <button class="train-btn" onclick="toggleTrain()">🔒 Admin Training</button>

  <div class="train-panel" id="trainPanel">
    <h3>🧠 AI Training</h3>
    <input type="password" id="passwortInput" placeholder="Passwort..." />
    <button onclick="ladeUnbekannte()">Unbekannte Fragen laden</button>
    <div class="unbekannte-liste" id="unbekannteListe"></div>
    <select id="intentSelect">
      <option value="">— Thema wählen —</option>
      <option value="anfänger">anfänger</option>
      <option value="atari">atari</option>
      <option value="freiheiten">freiheiten</option>
      <option value="captures">captures</option>
      <option value="opening">opening</option>
      <option value="ecken">ecken</option>
      <option value="gruppen">gruppen</option>
      <option value="leben_tod">leben_tod</option>
      <option value="ko">ko</option>
      <option value="punkte">punkte</option>
      <option value="territorium">territorium</option>
      <option value="joseki">joseki</option>
      <option value="tesuji">tesuji</option>
      <option value="sente">sente</option>
      <option value="begrüßung">begrüßung</option>
    </select>
    <button onclick="trainieren()">✅ Trainieren</button>
    <div id="trainStatus" style="font-size:0.85rem; color:#666;"></div>
  </div>
</div>

<script>
  let gewählteFrage = null;

  document.getElementById("frageInput").addEventListener("keydown", e => {
    if (e.key === "Enter") senden();
  });

  function addMessage(text, typ) {
    const box = document.getElementById("chatBox");
    const div = document.createElement("div");
    div.className = `message ${typ}`;
    div.innerHTML = `
      <div class="avatar ${typ}">${typ === "ai" ? "🤖" : "👤"}</div>
      <div class="bubble">${text}</div>
    `;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  function addTyping() {
    const box = document.getElementById("chatBox");
    const div = document.createElement("div");
    div.className = "message ai";
    div.id = "typing";
    div.innerHTML = `
      <div class="avatar ai">🤖</div>
      <div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>
    `;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  async function senden() {
    const input = document.getElementById("frageInput");
    const btn = document.getElementById("sendenBtn");
    const frage = input.value.trim();
    if (!frage) return;

    addMessage(frage, "user");
    input.value = "";
    btn.disabled = true;
    addTyping();

    const res = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ frage })
    });

    const daten = await res.json();
    document.getElementById("typing")?.remove();
    addMessage(daten.antwort, "ai");
    btn.disabled = false;
    input.focus();
  }

  function toggleTrain() {
    const panel = document.getElementById("trainPanel");
    panel.classList.toggle("open");
  }

  async function ladeUnbekannte() {
    const passwort = document.getElementById("passwortInput").value;
    if (!passwort) { alert("Passwort eingeben!"); return; }

    const res = await fetch("/unbekannt");
    const daten = await res.json();
    const liste = document.getElementById("unbekannteListe");
    liste.innerHTML = "";

    if (daten.length === 0) {
      liste.innerHTML = "<div style='color:#666; font-size:0.85rem;'>Keine unbekannten Fragen 👍</div>";
      return;
    }

    daten.forEach(frage => {
      const item = document.createElement("div");
      item.className = "unbekannte-item";
      item.textContent = frage;
      item.onclick = () => {
        document.querySelectorAll(".unbekannte-item").forEach(i => i.classList.remove("selected"));
        item.classList.add("selected");
        gewählteFrage = frage;
      };
      liste.appendChild(item);
    });
  }

  async function trainieren() {
    const passwort = document.getElementById("passwortInput").value;
    const intent = document.getElementById("intentSelect").value;
    const status = document.getElementById("trainStatus");

    if (!passwort || !gewählteFrage || !intent) {
      status.textContent = "❌ Passwort, Frage und Thema wählen!";
      status.style.color = "#ff4444";
      return;
    }

    const res = await fetch("/train", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ passwort, frage: gewählteFrage, intent })
    });

    const daten = await res.json();
    if (daten.erfolg) {
      status.textContent = `✅ Gelernt! Modell hat jetzt ${daten.beispiele} Beispiele.`;
      status.style.color = "#e8ff00";
      gewählteFrage = null;
      ladeUnbekannte();
    } else {
      status.textContent = `❌ ${daten.fehler}`;
      status.style.color = "#ff4444";
    }
  }
</script>
</body>
</html>
