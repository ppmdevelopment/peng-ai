<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learn Go — Peng AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #0d0d0d;
    color: white;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 700px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 2rem;
  }

  .header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.03em;
  }

  .header h1 span { color: #e8ff00; }

  .header p {
    color: #666;
    font-size: 0.9rem;
    margin-top: 0.3rem;
  }

  .chat-box {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    padding: 1rem 0;
  }

  .message {
    display: flex;
    gap: 0.8rem;
    align-items: flex-start;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { flex-direction: row-reverse; }

  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
  }

  .avatar.ai { background: #1a1a2e; border: 1px solid #e8ff00; }
  .avatar.user { background: #222; }

  .bubble {
    max-width: 80%;
    padding: 0.9rem 1.2rem;
    border-radius: 16px;
    font-size: 0.95rem;
    line-height: 1.6;
    white-space: pre-wrap;
  }

  .message.ai .bubble {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-top-left-radius: 4px;
  }

  .message.user .bubble {
    background: #e8ff00;
    color: #0d0d0d;
    border-top-right-radius: 4px;
  }

  .input-row {
    display: flex;
    gap: 0.8rem;
    margin-top: 1rem;
  }

  input[type="text"], input[type="password"] {
    flex: 1;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 0.9rem 1.2rem;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus { border-color: #e8ff00; }
  input::placeholder { color: #444; }

  button {
    background: #e8ff00;
    color: #0d0d0d;
    border: none;
    border-radius: 12px;
    padding: 0.9rem 1.5rem;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
  }

  button:hover { transform: translateY(-1px); opacity: 0.9; }
  button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .typing {
    display: flex;
    gap: 4px;
    padding: 0.5rem 0;
  }

  .typing span {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #444;
    animation: bounce 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-8px); background: #e8ff00; }
  }

  .train-btn {
    background: transparent;
    border: 1px solid #2a2a2a;
    color: #666;
    font-size: 0.8rem;
    padding: 0.5rem 1rem;
    margin-top: 0.5rem;
    width: 100%;
  }

  .train-panel {
    display: none;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 16px;
    padding: 1.5rem;
    margin-top: 1rem;
    gap: 1rem;
    flex-direction: column;
  }

  .train-panel.open { display: flex; }

  .train-panel h3 {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    color: #e8ff00;
  }

  select {
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 0.9rem 1.2rem;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    outline: none;
    width: 100%;
  }

  .unknown-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    max-height: 150px;
    overflow-y: auto;
  }

  .unknown-item {
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 0.6rem 1rem;
    font-size: 0.85rem;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .unknown-item:hover { border-color: #e8ff00; color: #e8ff00; }
  .unknown-item.selected { border-color: #e8ff00; color: #e8ff00; }

  .suggested-questions {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 0.5rem;
  }

  .suggestion {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 20px;
    padding: 0.4rem 0.9rem;
    font-size: 0.8rem;
    color: #aaa;
    cursor: pointer;
    transition: all 0.2s;
  }

  .suggestion:hover {
    border-color: #e8ff00;
    color: #e8ff00;
    background: transparent;
    transform: none;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Learn Go — <span>Peng AI</span> 围棋</h1>
    <p>Your personal Go (Weiqi) assistant — powered by ppm</p>
  </div>

  <div class="chat-box" id="chatBox">
    <div class="message ai">
      <div class="avatar ai">🤖</div>
      <div class="bubble">👋 Hello! I'm Peng AI, your Go assistant. Ask me anything about rules, strategies, or moves — I'll help you improve! 围棋</div>
    </div>
  </div>

  <div class="suggested-questions" id="suggestions">
    <div class="suggestion" onclick="askSuggestion('What is Atari?')">What is Atari?</div>
    <div class="suggestion" onclick="askSuggestion('How do I win?')">How do I win?</div>
    <div class="suggestion" onclick="askSuggestion('I am a beginner')">I am a beginner</div>
    <div class="suggestion" onclick="askSuggestion('What is Ko?')">What is Ko?</div>
    <div class="suggestion" onclick="askSuggestion('What are liberties?')">What are liberties?</div>
  </div>

  <div class="input-row">
    <input type="text" id="questionInput" placeholder="Ask a question about Go..." />
    <button id="sendBtn" onclick="send()">Send</button>
  </div>

  <button class="train-btn" onclick="toggleTrain()">🔒 Admin Training</button>

  <div class="train-panel" id="trainPanel">
    <h3>🧠 AI Training</h3>
    <input type="password" id="passwordInput" placeholder="Password..." />
    <button onclick="loadUnknown()">Load Unknown Questions</button>
    <div class="unknown-list" id="unknownList"></div>
    <select id="intentSelect">
      <option value="">— Select topic —</option>
      <option value="beginner">beginner</option>
      <option value="atari">atari</option>
      <option value="liberties">liberties</option>
      <option value="captures">captures</option>
      <option value="opening">opening</option>
      <option value="corners">corners</option>
      <option value="groups">groups</option>
      <option value="life_death">life_death</option>
      <option value="ko">ko</option>
      <option value="scoring">scoring</option>
      <option value="territory">territory</option>
      <option value="joseki">joseki</option>
      <option value="tesuji">tesuji</option>
      <option value="sente">sente</option>
      <option value="greeting">greeting</option>
    </select>
    <button onclick="trainAI()">✅ Train</button>
    <div id="trainStatus" style="font-size:0.85rem; color:#666;"></div>
  </div>
</div>

<script>
  let selectedQuestion = null;

  document.getElementById("questionInput").addEventListener("keydown", e => {
    if (e.key === "Enter") send();
  });

  function askSuggestion(text) {
    document.getElementById("questionInput").value = text;
    send();
  }

  function addMessage(text, type) {
    const box = document.getElementById("chatBox");
    const div = document.createElement("div");
    div.className = `message ${type}`;
    div.innerHTML = `
      <div class="avatar ${type}">${type === "ai" ? "🤖" : "👤"}</div>
      <div class="bubble">${text}</div>
    `;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  function addTyping() {
    const box = document.getElementById("chatBox");
    const div = document.createElement("div");
    div.className = "message ai";
    div.id = "typing";
    div.innerHTML = `
      <div class="avatar ai">🤖</div>
      <div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>
    `;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  async function send() {
    const input = document.getElementById("questionInput");
    const btn = document.getElementById("sendBtn");
    const question = input.value.trim();
    if (!question) return;

    addMessage(question, "user");
    input.value = "";
    btn.disabled = true;
    addTyping();

    const res = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question })
    });

    const data = await res.json();
    document.getElementById("typing")?.remove();
    addMessage(data.answer, "ai");
    btn.disabled = false;
    input.focus();
  }

  function toggleTrain() {
    document.getElementById("trainPanel").classList.toggle("open");
  }

  async function loadUnknown() {
    const password = document.getElementById("passwordInput").value;
    if (!password) { alert("Enter password first!"); return; }

    const res = await fetch("/unknown");
    const data = await res.json();
    const list = document.getElementById("unknownList");
    list.innerHTML = "";

    if (data.length === 0) {
      list.innerHTML = "<div style='color:#666; font-size:0.85rem;'>No unknown questions 👍</div>";
      return;
    }

    data.forEach(question => {
      const item = document.createElement("div");
      item.className = "unknown-item";
      item.textContent = question;
      item.onclick = () => {
        document.querySelectorAll(".unknown-item").forEach(i => i.classList.remove("selected"));
        item.classList.add("selected");
        selectedQuestion = question;
      };
      list.appendChild(item);
    });
  }

  async function trainAI() {
    const password = document.getElementById("passwordInput").value;
    const intent = document.getElementById("intentSelect").value;
    const status = document.getElementById("trainStatus");

    if (!password || !selectedQuestion || !intent) {
      status.textContent = "❌ Enter password, select a question and a topic!";
      status.style.color = "#ff4444";
      return;
    }

    const res = await fetch("/train", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password, question: selectedQuestion, intent })
    });

    const data = await res.json();
    if (data.success) {
      status.textContent = `✅ Learned! Model now has ${data.examples} examples.`;
      status.style.color = "#e8ff00";
      selectedQuestion = null;
      loadUnknown();
    } else {
      status.textContent = `❌ ${data.error}`;
      status.style.color = "#ff4444";
    }
  }
</script>
</body>
</html>
